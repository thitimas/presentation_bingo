<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentation Order</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 3rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #777;
      text-align: center;
      margin-bottom: 2rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0dfd8;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 560px;
    }

    /* Question label */
    .question-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 1.25rem;
      text-align: center;
      line-height: 1.5;
    }

    .question-label strong {
      display: block;
      font-size: 1rem;
      color: #1a1a1a;
      margin-bottom: 0.2rem;
    }

    /* Presenter rows */
    #presenterList { margin-bottom: 1rem; }

    .presenter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .presenter-row input {
      flex: 1;
      font-size: 0.9375rem;
      padding: 0.55rem 0.75rem;
      border: 1px solid #d8d7d0;
      border-radius: 8px;
      background: #fafaf8;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .presenter-row input:focus { border-color: #dc2626; }

    /* Preference picker */
    .pref-group {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .pref-btn {
      font-size: 0.6875rem;
      padding: 5px 7px;
      border: 1px solid #d8d7d0;
      border-radius: 6px;
      background: #fff;
      color: #666;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      line-height: 1;
    }

    .pref-btn:hover { border-color: #b91c1c; color: #b91c1c; }

    .pref-btn.active.early   { background: #fee2e2; border-color: #dc2626; color: #991b1b; font-weight: 600; }
    .pref-btn.active.middle  { background: #fef9c3; border-color: #ca8a04; color: #713f12; font-weight: 600; }
    .pref-btn.active.late    { background: #f1f5f9; border-color: #475569; color: #1e293b; font-weight: 600; }
    .pref-btn.active.wild    { background: #111;    border-color: #000;    color: #fff;     font-weight: 600; }

    .remove-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.12s;
    }

    .remove-btn:hover { color: #b91c1c; }

    /* Add + Generate buttons */
    .btn-add {
      width: 100%;
      font-size: 0.875rem;
      padding: 0.55rem;
      background: none;
      border: 1px dashed #d8d7d0;
      border-radius: 8px;
      color: #999;
      cursor: pointer;
      margin-bottom: 1.25rem;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-add:hover { border-color: #b91c1c; color: #b91c1c; }

    .btn-generate {
      width: 100%;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem;
      background: #b91c1c;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.08s;
      letter-spacing: 0.01em;
    }

    .btn-generate:hover  { background: #991b1b; }
    .btn-generate:active { transform: scale(0.98); }

    /* Legend */
    .legend {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #999;
    }

    .legend span { display: flex; align-items: center; gap: 4px; }

    /* Result panel */
    #resultPanel {
      display: none;
      width: 100%;
      max-width: 560px;
      margin-top: 1.25rem;
    }

    .result-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 0.875rem;
    }

    .order-list { list-style: none; }

    .order-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border: 1px solid #e4e3dc;
      border-radius: 12px;
      padding: 0.875rem 1rem;
      margin-bottom: 8px;
      opacity: 0;
      transform: translateX(-16px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .order-item.show {
      opacity: 1;
      transform: translateX(0);
    }

    .order-num {
      font-size: 1.125rem;
      font-weight: 700;
      color: #b91c1c;
      min-width: 28px;
      text-align: right;
    }

    .order-name {
      font-size: 1rem;
      font-weight: 500;
      color: #1a1a1a;
      flex: 1;
    }

    .order-pref {
      font-size: 0.75rem;
      color: #aaa;
    }

    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      font-size: 0.875rem;
      padding: 0.6rem;
      background: none;
      border: 1px solid #d8d7d0;
      border-radius: 8px;
      color: #888;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-reset:hover { border-color: #b91c1c; color: #b91c1c; }

    @media (max-width: 480px) {
      body { padding: 1.25rem 0.75rem 2rem; }
      h1 { font-size: 1.25rem; }
      .pref-btn { font-size: 0.625rem; padding: 4px 5px; }
      .presenter-row input { font-size: 0.875rem; }
    }
  </style>
</head>
<body>

  <h1>Presentation Order</h1>
  <p class="subtitle">Enter everyone's name, pick their vibe, then shuffle.</p>

  <div class="card">
    <div class="question-label">
      <strong>When would you like to present today?</strong>
      Pick a preference for each person — it'll shape the order.
    </div>

    <div id="presenterList"></div>

    <button class="btn-add" id="addBtn">+ Add presenter</button>

    <button class="btn-generate" id="generateBtn">Shuffle &amp; reveal order</button>

    <div class="legend">
      <span><span style="color:#dc2626">●</span> Go early</span>
      <span><span style="color:#ca8a04">●</span> Middle is fine</span>
      <span><span style="color:#475569">●</span> Save me for last</span>
      <span><span style="color:#111">●</span> Surprise me</span>
    </div>
  </div>

  <div id="resultPanel">
    <p class="result-title">Today's presentation order</p>
    <ol class="order-list" id="orderList"></ol>
    <button class="btn-reset" id="resetBtn">Shuffle again</button>
  </div>

  <script>
    const PREFS = [
      { key: "early",  label: "Go early",          cls: "early"  },
      { key: "middle", label: "Middle is fine",     cls: "middle" },
      { key: "late",   label: "Save me for last",   cls: "late"   },
      { key: "wild",   label: "Surprise me",        cls: "wild"   },
    ];

    let rowCount = 0;

    function addRow(name = "", pref = "wild") {
      rowCount++;
      const id = rowCount;
      const list = document.getElementById("presenterList");

      const row = document.createElement("div");
      row.className = "presenter-row";
      row.dataset.id = id;

      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = `Presenter ${id}`;
      input.value = name;
      input.setAttribute("aria-label", "Presenter name");

      const prefGroup = document.createElement("div");
      prefGroup.className = "pref-group";

      PREFS.forEach(p => {
        const btn = document.createElement("button");
        btn.className = "pref-btn" + (p.key === pref ? ` active ${p.cls}` : "");
        btn.textContent = p.label;
        btn.dataset.pref = p.key;
        btn.addEventListener("click", () => {
          prefGroup.querySelectorAll(".pref-btn").forEach(b => {
            b.className = "pref-btn";
          });
          btn.className = `pref-btn active ${p.cls}`;
        });
        prefGroup.appendChild(btn);
      });

      const removeBtn = document.createElement("button");
      removeBtn.className = "remove-btn";
      removeBtn.textContent = "×";
      removeBtn.setAttribute("aria-label", "Remove");
      removeBtn.addEventListener("click", () => {
        row.remove();
      });

      row.appendChild(input);
      row.appendChild(prefGroup);
      row.appendChild(removeBtn);
      list.appendChild(row);

      input.focus();
    }

    function getRowData() {
      return [...document.querySelectorAll(".presenter-row")].map(row => {
        const name = row.querySelector("input").value.trim();
        const activeBtn = row.querySelector(".pref-btn.active");
        const pref = activeBtn ? activeBtn.dataset.pref : "wild";
        return { name, pref };
      }).filter(r => r.name);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function generateOrder(presenters) {
      // Group by preference
      const groups = { early: [], middle: [], late: [], wild: [] };
      presenters.forEach(p => groups[p.pref].push(p));

      // Shuffle within each group
      Object.keys(groups).forEach(k => { groups[k] = shuffle(groups[k]); });

      // Build slots: early → middle → late
      // Distribute "wild" randomly throughout all slots
      const ordered = [
        ...groups.early,
        ...groups.middle,
        ...groups.late
      ];

      // Sprinkle wild cards in random positions
      groups.wild.forEach(p => {
        const pos = Math.floor(Math.random() * (ordered.length + 1));
        ordered.splice(pos, 0, p);
      });

      return ordered;
    }

    function prefLabel(pref) {
      return { early: "wanted early", middle: "wanted middle", late: "wanted last", wild: "surprise" }[pref] || "";
    }

    function showResult(ordered) {
      const panel = document.getElementById("resultPanel");
      const list  = document.getElementById("orderList");

      list.innerHTML = "";
      ordered.forEach((p, i) => {
        const li = document.createElement("li");
        li.className = "order-item";

        li.innerHTML = `
          <span class="order-num">${i + 1}</span>
          <span class="order-name">${p.name}</span>
          <span class="order-pref">${prefLabel(p.pref)}</span>
        `;
        list.appendChild(li);
      });

      panel.style.display = "block";
      panel.scrollIntoView({ behavior: "smooth", block: "start" });

      // Staggered reveal
      const items = list.querySelectorAll(".order-item");
      items.forEach((item, i) => {
        setTimeout(() => item.classList.add("show"), i * 140 + 80);
      });
    }

    // Events
    document.getElementById("addBtn").addEventListener("click", () => addRow());

    document.getElementById("generateBtn").addEventListener("click", () => {
      const presenters = getRowData();
      if (presenters.length < 2) {
        alert("Add at least 2 presenters first!");
        return;
      }
      const ordered = generateOrder(presenters);
      showResult(ordered);
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      const presenters = getRowData();
      const ordered = generateOrder(presenters);

      // Reset items then re-reveal
      document.querySelectorAll(".order-item").forEach(el => el.classList.remove("show"));
      setTimeout(() => showResult(ordered), 200);
    });

    // Start with some empty rows
    addRow(); addRow(); addRow();
    // Unfocus the last one so it doesn't look weird
    document.activeElement?.blur();
  </script>
</body>
</html>
